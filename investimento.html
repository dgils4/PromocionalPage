<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<meta
name="theme-color"
content="#111827">

<title>
Controle de Investimentos
</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f5f5f5;
  color:#222;
  padding:15px;
  padding-bottom:90px;
}

.container{
  max-width:700px;
  margin:auto;
}

.titulo{
  font-size:24px;
  font-weight:bold;
  text-align:center;
  margin-bottom:15px;
}

.card{
  background:#fff;
  border-radius:12px;
  padding:15px;
  margin-bottom:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card span{
  color:#777;
  font-size:14px;
}

.card h2{
  margin-top:5px;
}

.barra{
  height:20px;
  background:#ddd;
  border-radius:50px;
  overflow:hidden;
  margin-top:10px;
}

.progresso{
  height:100%;
  width:0%;
  background:#22c55e;
  transition:.3s;
}

#lista{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.item{
  background:#fff;
  border-radius:12px;
  padding:15px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.item h3{
  margin-bottom:10px;
}

.item p{
  margin:4px 0;
}

.item button{
  margin-top:10px;
}

button{
  border:none;
  padding:12px;
  border-radius:10px;
  background:#111827;
  color:#fff;
  cursor:pointer;
}

#fab{
  position:fixed;
  right:20px;
  bottom:20px;

  width:60px;
  height:60px;

  border-radius:50%;
  font-size:30px;
  z-index:1000;
}

.modal{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,.5);

  display:none;
  justify-content:center;
  align-items:center;

  z-index:2000;
}

.modal-content{
  width:95%;
  max-width:500px;

  background:#fff;

  border-radius:15px;
  padding:20px;

  display:flex;
  flex-direction:column;
  gap:10px;
}

input,
textarea{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
}

.modal-buttons{
  display:flex;
  gap:10px;
}

.modal-buttons button{
  flex:1;
}

</style>

</head>

<body>

<div class="container">

  <div class="titulo">
    Controle de Investimentos
  </div>

  <div class="card">

    <span>Capital Atual</span>

    <h2 id="capitalAtual">
      R$ 1.000,00
    </h2>

  </div>

  <div class="card">

    <span>Meta Capital</span>

    <p id="textoMetaCapital">
      R$ 1.000,00 / R$ 10.000,00
    </p>

    <div class="barra">
      <div
      id="barraCapital"
      class="progresso">
      </div>
    </div>

    <p id="percentualCapital">
      10%
    </p>

  </div>

  <div class="card">

    <span>Meta Produtos</span>

    <p id="textoMetaProdutos">
      0 / 100
    </p>

    <div class="barra">
      <div
      id="barraProdutos"
      class="progresso">
      </div>
    </div>

    <p id="percentualProdutos">
      0%
    </p>

  </div>

  <div id="lista"></div>

</div>

<button
id="fab"
onclick="abrirModal()">
+
</button>

<div
id="modal"
class="modal">

  <div class="modal-content">

    <h2>
      Novo Investimento
    </h2>

<input
id="descricao"
placeholder="Descrição"
list="sugestoesLista"
oninput="buscarSugestoes(this.value)"
onchange="preencherFormulario(this.value)">

<datalist id="sugestoesLista"></datalist>

    <input
    id="valorInvestido"
    type="number"
    placeholder="Valor Investido">

    <input
    id="quantidade"
    type="number"
    placeholder="Quantidade">

    <input
    id="precoVenda"
    type="number"
    placeholder="Preço Previsto de Venda">

    <textarea
    id="observacao"
    placeholder="Observação">
    </textarea>

    <div class="modal-buttons">

      <button
      onclick="fecharModal()">
        Cancelar
      </button>

      <button
      onclick="salvarInvestimento()">
        Salvar
      </button>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://cdechrtprerblmhllqav.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkZWNocnRwcmVyYmxtaGxscWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjc3MjMsImV4cCI6MjA5MTYwMzcyM30.m-RFl-dDWFsjbWqSZw-y0BDqnpHX5hMH8Z361MCT_Rk";

const db =
supabase.createClient(
  supabaseUrl,
  supabaseKey
);

<script>

let capitalAtual = 0;
let metaCapital = 10000;

let produtosAtual = 0;
let metaProdutos = 100;

let investimentos = [];
let pressTimer = null;
let segurandoId = null;

let movimentacoes = [];
const lista = document.getElementById("lista");

function abrirModal(){

  document.getElementById("descricao").value = "";
  document.getElementById("valorInvestido").value = "";
  document.getElementById("quantidade").value = "";
  document.getElementById("precoVenda").value = "";
  document.getElementById("observacao").value = "";

  modal.style.display = "flex";
}

function fecharModal(){
  modal.style.display="none";
}

function atualizarIndicadores(){

  let percentualCapital =
  (capitalAtual/metaCapital)*100;

  let percentualProdutos =
  (produtosAtual/metaProdutos)*100;

  document
  .getElementById("capitalAtual")
  .innerText =
  `R$ ${capitalAtual.toFixed(2)}`;

  document
  .getElementById("textoMetaCapital")
  .innerText =
  `R$ ${capitalAtual.toFixed(2)} / R$ ${metaCapital.toFixed(2)}`;

  document
  .getElementById("barraCapital")
  .style.width =
  percentualCapital + "%";

  document
  .getElementById("percentualCapital")
  .innerText =
  percentualCapital.toFixed(1)+"%";

  document
  .getElementById("textoMetaProdutos")
  .innerText =
  `${produtosAtual} / ${metaProdutos}`;

  document
  .getElementById("barraProdutos")
  .style.width =
  percentualProdutos + "%";

  document
  .getElementById("percentualProdutos")
  .innerText =
  percentualProdutos.toFixed(1)+"%";
}





function renderizar(){

  atualizarIndicadores();

  lista.innerHTML = "";

  investimentos.forEach(
  (item,indice)=>{

    lista.innerHTML += `

   <div class="item"
  onmousedown="iniciarPress(${item.id})"
  onmouseup="cancelarPress()"
  onmouseleave="cancelarPress()"
  ontouchstart="iniciarPress(${item.id})"
  ontouchend="cancelarPress()"
>

      <h3>
        ${item.descricao}
      </h3>

<p>
  Investido:
  R$ ${item.valor_investido}
</p>

<p>
  Venda Prevista:
  R$ ${item.preco_venda_previsto}
</p>

      <p>
        Quantidade:
        ${item.quantidade}
      </p>

  

      <p>
        Status:
        ${item.status}
      </p>

      ${
      item.status==="Em andamento"
      ?

      `<button
    onclick="registrarVenda(${item.id})" style="width:100%">
      Registrar Venda

      </button>`

      :

      `<p>
      Lucro:
      R$ ${item.lucro}
      </p>`
      }
<button
  id="del-${item.id}"
  style="display:none;background:red;margin-top:10px; width:100%"
  onclick="excluirInvestimento(${item.id})"
>
  Excluir
</button>
      

    </div>

    `;

  });

}

async function carregarConfiguracoes(){

  const { data, error } =
  await db
  .from("investimento_config")
  .select("*")
  .limit(1)
  .single();

  if(error){
    console.log(error);
    return;
  }

  capitalAtual =
  Number(data.capital_inicial);

  metaCapital =
  Number(data.meta_capital);

  metaProdutos =
  Number(data.meta_produtos);

  atualizarIndicadores();

}
async function salvarInvestimento(){


  const descricao =
  document.getElementById("descricao").value.trim();

  const valorInvestido =
  Number(document.getElementById("valorInvestido").value);

  const quantidade =
  Number(document.getElementById("quantidade").value);

  const precoVenda =
  Number(document.getElementById("precoVenda").value);

  const observacao =
  document.getElementById("observacao").value.trim();

  // 🔒 VALIDAÇÕES
  if(!descricao){
    alert("Preencha a descrição");
    return;
  }

  if(!valorInvestido || valorInvestido <= 0){
    alert("Valor investido inválido");
    return;
  }

  if(!quantidade || quantidade <= 0){
    alert("Quantidade inválida");
    return;
  }

  if(!precoVenda || precoVenda <= 0){
    alert("Preço de venda inválido");
    return;
  }  
  
  


  const { data, error } =
  await db
  .from("investimentos")
  .insert({
    descricao,
    valor_investido: valorInvestido,
    quantidade,
    preco_venda_previsto: precoVenda,
    observacao,
    status: "Em andamento"
  })
  .select()
  .single();

await db.from("movimentacoes").insert({
  tipo: "Investimento",
  valor: -valorInvestido,
  investimento_id: data.id
});

  if(error){
    console.log(error);
    return;
  }





  fecharModal();
await sync();
}


async function carregarInvestimentos(){

  const { data, error } =
  await db
  .from("investimentos")
  .select("*")
  .order("id",{
    ascending:false
  });

  if(error){
    console.log(error);
    return;
  }

  investimentos =
  data || [];

  produtosAtual =
  investimentos.reduce(
    (total,item)=>
    total +
    Number(item.quantidade || 0),
    0
  );

  renderizar();

}





async function calcularCapitalAtual(){

  const { data: config } = await db
    .from("investimento_config")
    .select("*")
    .single();

  const { data: movs } = await db
    .from("movimentacoes")
    .select("valor");

  const totalMov = (movs || []).reduce(
    (acc, m) => acc + Number(m.valor || 0),
    0
  );

  capitalAtual =
    Number(config.capital_inicial || 0) + totalMov;

  atualizarIndicadores();
}

async function carregarMovimentacoes(){

  const { data } =
  await db
  .from("movimentacoes")
  .select("*");

  movimentacoes = data || [];

}


async function registrarVenda(id){

  const valorRecebido = Number(prompt("Valor recebido:"));
  if(!valorRecebido) return;

  const item = investimentos.find(i => i.id === id);

  const lucro = valorRecebido - item.valor_investido;

  const { error } = await db.from("investimentos")
    .update({
      retorno: valorRecebido,
      lucro,
      status: "Vendido"
    })
    .eq("id", id);

  if(error){
    console.log(error);
    return;
  }

  const { error: errorMov } = await db.from("movimentacoes")
    .insert({
      tipo: "Venda",
      valor: lucro,
      investimento_id: id
    });

  if(errorMov){
    console.log(errorMov);
    return;
  }

  await carregarMovimentacoes();
  await calcularCapitalAtual();
  await carregarInvestimentos();
}


async function excluirInvestimento(id){

  const confirmacao = confirm("Deseja excluir este investimento?");
  if(!confirmacao) return;

  const { error } = await db
    .from("investimentos")
    .delete()
    .eq("id", id);

  if(error){
    console.log(error);
    return;
  }

  await db
    .from("movimentacoes")
    .delete()
    .eq("investimento_id", id);

  await sync();
}

function iniciarPress(id){
  segurandoId = id;

  pressTimer = setTimeout(() => {
    mostrarBotaoExcluir(id);
  }, 2000);
}

function cancelarPress(){
  clearTimeout(pressTimer);
  pressTimer = null;
  segurandoId = null;
}
function mostrarBotaoExcluir(id){
  const btn = document.getElementById(`del-${id}`);
  if(btn) btn.style.display = "block";
}


async function buscarSugestoes(texto){

  if(!texto || texto.length < 2) return;

  const { data, error } = await db
    .from("investimentos")
    .select("*")
    .ilike("descricao", `%${texto}%`)
    .limit(5);

  if(error){
    console.log(error);
    return;
  }

  const lista = document.getElementById("sugestoesLista");
  lista.innerHTML = "";

  data.forEach(item => {
    const option = document.createElement("option");
    option.value = item.descricao;
    lista.appendChild(option);
  });
}

async function preencherFormulario(descricao){

  const { data, error } = await db
    .from("investimentos")
    .select("*")
    .eq("descricao", descricao)
    .order("id", { ascending: false })
    .limit(1)
    .single();

  if(error || !data) return;

  document.getElementById("valorInvestido").value = data.valor_investido;
  document.getElementById("quantidade").value = data.quantidade;
  document.getElementById("precoVenda").value = data.preco_venda_previsto;
  document.getElementById("observacao").value = data.observacao || "";
}
async function sync(){

  await carregarMovimentacoes();
  await carregarInvestimentos();
  await calcularCapitalAtual();

  atualizarIndicadores();

}

window.onload = async () => {

  await carregarConfiguracoes();

  await carregarMovimentacoes();
  await carregarInvestimentos();

  await calcularCapitalAtual();
 
};
</script>

</body>

</html>
