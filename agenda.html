async function salvarAtendimento(){

 const telefoneLimpo = fone.value.replace(/\D/g,'');

 if(telefoneLimpo.length !== 11){
  alert("Digite um celular válido com DDD (11 números).");
  fone.focus();
  return;
 }

 try {

 const nomeFinal = nome.value.trim() === ""
 ? "desconhecido"
 : nome.value.trim();

 const dados = {
   data: dataInput.value,
   hora: hora.value,
   nome_cliente: nomeFinal,
   telefone: telefoneLimpo,
   barbeiro: barbeiro.value,
   tipo_cliente: tipo.value,
   numero_corte: corte.value,
   forma_pagamento: pag.value,
   valor: valorr.value,
   observacao: obs.value,
   servico: valor.value
 };

 let resposta;

 if(editandoId){
   resposta = await db
   .from('atendimentos')
   .update(dados)
   .eq('id', editandoId);
 } else {
   resposta = await db
   .from('atendimentos')
   .insert([dados]);
 }

 if(resposta.error){
   alert(resposta.error.message);
   return;
 }

 // ✅ AQUI É O LUGAR CERTO (IMPORTANTE)

 await db
 .from("clientes")
 .upsert([{
   nome: nomeFinal,
   telefone: telefoneLimpo
 }],{
   onConflict:"telefone"
 });

 if(tipo.value === "plano"){
   await db
   .from("clientes")
   .update({
     status_plano:"ativo",
     data_adesao_plano:dataInput.value
   })
   .eq("telefone", telefoneLimpo);
 }

 alert('Salvo com sucesso');

 editandoId = null;
 modal.style.display = "none";
 carregarHoje();

 } catch(e){
   alert("Falha: " + e.message);
 }
}

async function calcularFaturamento(){

 const { data } = await db
 .from('atendimentos')
 .select('*');

 let totalGeral = 0;
 let gilberto = 0;
 let Thiago = 0;

 data.forEach(item => {
   const v = Number(item.valor || 0);
   totalGeral += v;

   if(item.barbeiro === "Gilberto") gilberto += v;
   if(item.barbeiro === "Thiago") Thiago += v;
 });

 document.getElementById("fatResultado").innerHTML = `
   <p>💈 Gilberto: R$ ${gilberto.toFixed(2)}</p>
   <p>💈 Thiago: R$ ${Thiago.toFixed(2)}</p>
   <hr>
   <h3>Total: R$ ${totalGeral.toFixed(2)}</h3>
 `;
}

async function calcularPlanos(){

 const inicio = document.getElementById("planoInicio").value;
 const fim = document.getElementById("planoFim").value;
 const box = document.getElementById("resultadoPlanos");

 if(!inicio || !fim){
   box.innerHTML = "Escolha as datas";
   return;
 }

 box.innerHTML = "Carregando...";

 const { data, error } = await db
 .from("atendimentos")
 .select("*")
 .eq("tipo_cliente", "plano")
 .gte("data", inicio)
 .lte("data", fim)
 .order("data");

 if(error){
   box.innerHTML = error.message;
   return;
 }

 if(!data.length){
   box.innerHTML = "Nenhum cliente plano no período";
   return;
 }

 let total = 0;
 let gilberto = 0;
 let thiago = 0;
 let html = "";

 data.forEach(item => {

   const valor = Number(item.valor || 0);
   total += valor;

   if(item.barbeiro === "Gilberto") gilberto++;
   if(item.barbeiro === "Thiago") thiago++;

   html += `
   <div style="background:#111827;padding:10px;margin:6px 0;border-radius:8px">
     <strong>${item.nome_cliente}</strong><br>
     ${item.data} - Corte ${item.numero_corte}/4<br>
     <small>${item.barbeiro} • R$ ${valor.toFixed(2)}</small>
   </div>
   `;
 });

 box.innerHTML = `
   <h3>Total recebido: R$ ${total.toFixed(2)}</h3>

   <p>📌 Atendimentos plano: ${data.length}</p>
   <p>💈 Gilberto: ${gilberto}</p>
   <p>💈 Thiago: ${thiago}</p>

   <hr>

   ${html}
 `;
}



async function calcularPeriodo(){

 const inicio = document.getElementById("dataInicio").value;
 const fim = document.getElementById("dataFim").value;
 const prof = document.getElementById("calProf").value;
 const resultado = document.getElementById("resultadoPeriodo");

 if(!inicio || !fim){
   resultado.innerHTML = "Selecione as duas datas";
   return;
 }

 resultado.innerHTML = "Carregando...";

 let query = db
  .from("atendimentos")
  .select("*")
  .gte("data", inicio)   // maior ou igual
  .lte("data", fim);     // menor ou igual

 if(prof !== "Todos"){
   query = query.eq("barbeiro", prof);
 }

 const { data, error } = await query;

 if(error){
   resultado.innerHTML = "Erro ao carregar";
   return;
 }

 if(!data.length){
   resultado.innerHTML = "Nenhum atendimento nesse período";
   return;
 }

 let total = 0;

 let html = "";

 data.forEach(item => {
   total += Number(item.valor || 0);

   html += `
     <div style="background:#111827;margin:5px;padding:10px;border-radius:8px">
       <strong>${item.data}</strong> - ${item.hora}<br>
       ${item.nome_cliente} • ${item.barbeiro}<br>
       <small>R$ ${item.valor}</small>
     </div>
   `;
 });

 resultado.innerHTML = `
   <h3>💰 Total do período: R$ ${total.toFixed(2)}</h3>
   ${html}
 `;
}

async function backupCSV(){

 const { data, error } = await db
 .from("atendimentos")
 .select("*")
 .order("data", { ascending: true });

 if(error){
   alert("Erro ao gerar backup");
   return;
 }

 if(!data.length){
   alert("Nenhum dado encontrado");
   return;
 }

 let csv = "";

 const colunas = Object.keys(data[0]);
 csv += colunas.join(";") + "\n";

 data.forEach(item => {

   const linha = colunas.map(col => {
     let valor = item[col] ?? "";
     valor = String(valor).replace(/;/g, ",");
     return `"${valor}"`;
   }).join(";");

   csv += linha + "\n";
 });

 const blob = new Blob([csv], {
   type: "text/csv;charset=utf-8;"
 });
