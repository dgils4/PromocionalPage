<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos Los Visionários</title><style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #0077b6;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 24px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  text-align: center;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 8px;
}

.card h3 {
  margin: 10px 0 5px;
}

.card p {
  font-size: 14px;
}

.price {
  color: #0077b6;
  font-weight: bold;
  margin: 5px 0;
}

button {
  background: black;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 5px;
  cursor: pointer;
}

.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #0077b6;
  color: white;
  padding: 10px;
  display: flex;
  justify-content: space-between;
}

.qty-box {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin: 5px 0;
}

.qty-box button {
  padding: 5px 10px;
  background: #0077b6;
}
</style></head><body><header>Produtos Los Visionários</header><div class="container" id="produtos"></div><div class="cart">
  <span id="total">Total: R$ 0</span>
  <button onclick="finalizarCompra()">Finalizar Compra</button>
</div><script>
let carrinho = [];

let produtos = [
  {id:1, nome:"Pomada", preco:30, desc:"Fixação forte", img:"https://via.placeholder.com/200"},
  {id:2, nome:"Gel", preco:20, desc:"Brilho intenso", img:"https://via.placeholder.com/200"},
  {id:3, nome:"Shampoo", preco:25, desc:"Limpeza profunda", img:"https://via.placeholder.com/200"},
  {id:4, nome:"Condicionador", preco:25, desc:"Hidratação", img:"https://via.placeholder.com/200"},
  {id:5, nome:"Óleo para barba", preco:35, desc:"Maciez", img:"https://via.placeholder.com/200"},
  {id:6, nome:"Cera", preco:28, desc:"Modelagem", img:"https://via.placeholder.com/200"},
  {id:7, nome:"Navalha", preco:15, desc:"Precisão", img:"https://via.placeholder.com/200"},
  {id:8, nome:"Escova", preco:18, desc:"Para cabelo", img:"https://via.placeholder.com/200"},
  {id:9, nome:"Pente", preco:10, desc:"Estilo", img:"https://via.placeholder.com/200"},
  {id:10, nome:"Spray", preco:22, desc:"Fixação leve", img:"https://via.placeholder.com/200"},
  {id:11, nome:"Perfume", preco:60, desc:"Masculino", img:"https://via.placeholder.com/200"},
  {id:12, nome:"Talco", preco:12, desc:"Pós corte", img:"https://via.placeholder.com/200"},
  {id:13, nome:"Creme barbear", preco:20, desc:"Suave", img:"https://via.placeholder.com/200"},
  {id:14, nome:"Espuma", preco:22, desc:"Barba", img:"https://via.placeholder.com/200"},
  {id:15, nome:"Toalha", preco:15, desc:"Profissional", img:"https://via.placeholder.com/200"},
  {id:16, nome:"Máscara capilar", preco:30, desc:"Tratamento", img:"https://via.placeholder.com/200"},
  {id:17, nome:"Vitaminas", preco:40, desc:"Crescimento", img:"https://via.placeholder.com/200"},
  {id:18, nome:"Pós barba", preco:25, desc:"Refrescante", img:"https://via.placeholder.com/200"},
  {id:19, nome:"Kit barba", preco:80, desc:"Completo", img:"https://via.placeholder.com/200"},
  {id:20, nome:"Kit cabelo", preco:70, desc:"Completo", img:"https://via.placeholder.com/200"}
];

function renderProdutos(){
  let container = document.getElementById("produtos");
  container.innerHTML = "";

  produtos.forEach(p => {
    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.img}">
      <h3>${p.nome}</h3>
      <p>${p.desc}</p>
      <div class="price">R$ ${p.preco}</div>
      <div class="qty-box">
        <button onclick="alterarQtd(${p.id}, -1)">-</button>
        <span id="qtd-${p.id}">1</span>
        <button onclick="alterarQtd(${p.id}, 1)">+</button>
      </div>
      <button onclick="addCarrinho(${p.id})">Adicionar</button>
    `;

    container.appendChild(div);
  });
}

let quantidades = {};

function alterarQtd(id, valor){
  if(!quantidades[id]) quantidades[id] = 1;
  quantidades[id] += valor;

  if(quantidades[id] < 1) quantidades[id] = 1;

  document.getElementById("qtd-"+id).innerText = quantidades[id];
}

function addCarrinho(id){
  let produto = produtos.find(p => p.id === id);
  let qtd = quantidades[id] || 1;

  carrinho.push({...produto, qtd});
  atualizarTotal();
}

function atualizarTotal(){
  let total = 0;
  carrinho.forEach(item => {
    total += item.preco * item.qtd;
  });

  document.getElementById("total").innerText = "Total: R$ " + total;
}

function finalizarCompra(){
  alert("Pedido enviado! (Aqui você pode integrar com WhatsApp ou pagamento)");
}

renderProdutos();
</script></body>
</html>
