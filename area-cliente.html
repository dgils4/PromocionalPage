<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Loja</title>
</head>
<body>

<h1>Produtos</h1>

<a href="login.html">Área do Admin</a>

<div id="produtos"></div>

<script>
let produtos = [
  { id: 1, nome: "Pomada", preco: 30 },
  { id: 2, nome: "Gel", preco: 20 }
];

produtos.forEach(p => {
  document.getElementById("produtos").innerHTML += `
    <p>${p.nome} - R$ ${p.preco}</p>
  `;
});
</script>

</body>
</html>
