async function salvarRifa(){

  const titulo =
  document.getElementById("titulo").value.trim();

  const descricao =
  document.getElementById("descricao").value.trim();

  const imagem =
  document.getElementById("imagem").value.trim();

  const valorNumero =
  document.getElementById("valorNumero").value;

  const quantidadeNumeros =
  document.getElementById(
    "quantidadeNumeros"
  ).value;

  const dataSorteio =
  document.getElementById(
    "dataSorteio"
  ).value;

  if(!titulo){
    alert("Informe o título da rifa.");
    return;
  }

  if(!descricao){
    alert("Informe a descrição.");
    return;
  }

  if(!imagem){
    alert("Informe a imagem.");
    return;
  }

  if(!valorNumero || Number(valorNumero) <= 0){
    alert("Informe um valor válido.");
    return;
  }

  if(!quantidadeNumeros ||
     Number(quantidadeNumeros) <= 0){
    alert("Informe a quantidade de números.");
    return;
  }

  if(!dataSorteio){
    alert("Informe a data do sorteio.");
    return;
  }

const { data, error } =
await db
.from("rifas")
.insert([{
  titulo,
  descricao,
  imagem,
  valor_numero: valorNumero,
  quantidade_numeros: quantidadeNumeros,
  data_sorteio: dataSorteio,
  status: "Ativa"
}])
.select()
.single();

  if(error){
    console.log(error);
    alert("Erro ao salvar.");
    return;
  }

  await gerarNumeros(
    data.id,
    quantidadeNumeros
  );

  alert("Rifa criada com sucesso!");
  carregarRifas();
  document.getElementById("titulo").value = "";

document.getElementById("descricao").value = "";

document.getElementById("imagem").value = "";

document.getElementById("valorNumero").value = "";

document.getElementById("quantidadeNumeros").value = "";

document.getElementById("dataSorteio").value = "";
}


async function gerarNumeros(
  rifaId,
  quantidade
){

  const numeros = [];

  for(
    let i = 1;
    i <= quantidade;
    i++
  ){

    numeros.push({

      rifa_id: rifaId,

      numero: i,

      status:
      "Disponivel"

    });

  }

  const { error } =
  await db
  .from("rifa_numeros")
  .insert(numeros);

  if(error){

    console.log(error);

  }

}

async function carregarRifas(){

  const lista =
  document.getElementById(
    "listaRifas"
  );

  lista.innerHTML =
  "Carregando...";

  const { data, error } =
  await db
  .from("rifas")
  .select("*")
  .order("id",
  { ascending:false });

  if(error){

    console.log(error);

    lista.innerHTML =
    "Erro ao carregar.";

    return;
  }

  if(data.length === 0){

    lista.innerHTML =
    "Nenhuma rifa cadastrada.";

    return;
  }

  lista.innerHTML = "";

  data.forEach(rifa => {

    lista.innerHTML += `

<div
  class="rifaItem"

  onclick="abrirRifa(${rifa.id})"

  ontouchstart="iniciarPressao(${rifa.id})"
  ontouchend="cancelarPressao()"

  onmousedown="iniciarPressao(${rifa.id})"
  onmouseup="cancelarPressao()"
>

  <h3>${rifa.titulo}</h3>

  <p>
    ${rifa.quantidade_numeros}
    números
  </p>

  <p>
    R$
    ${Number(
      rifa.valor_numero
    ).toFixed(2)}
  </p>

</div>

`;

  });

}


let timerExcluir = null;

function iniciarPressao(rifaId){

  timerExcluir = setTimeout(() => {

    const confirmar =
    confirm(
      "Excluir esta rifa?"
    );

    if(confirmar){

      excluirRifa(rifaId);

    }

  },3000);

}

function cancelarPressao(){

  clearTimeout(
    timerExcluir
  );

}

async function excluirRifa(rifaId){

  await db
  .from("rifa_numeros")
  .delete()
  .eq("rifa_id",rifaId);

  await db
  .from("rifa_premios")
  .delete()
  .eq("rifa_id",rifaId);

  await db
  .from("rifa_sorteios")
  .delete()
  .eq("rifa_id",rifaId);

  await db
  .from("rifas")
  .delete()
  .eq("id",rifaId);

  carregarRifas();

}

  grade.innerHTML = "";

  data.forEach(item => {

    let classe = "disponivel";

    if(item.status === "Reservado"){
      classe = "reservado";
    }

    if(item.status === "Pago"){
      classe = "pago";
    }

    if(item.status === "Premiado"){
      classe = "premiado";
    }

    grade.innerHTML += `

   <div
class="numero ${classe}"
onclick="abrirNumero(${item.id})">

  ${item.numero}

</div>

    `;

  });

}

  prompt(
    "Telefone:",
    ""
  );

  if(telefone === null) return;

  await db
  .from("rifa_numeros")
  .update({
    nome_cliente:nome,
    telefone:telefone,
    status:"Reservado"
  })
  .eq("id",id);

  carregarNumeros(
    data.rifa_id
  );

}

async function carregarEstatisticas(rifaId){

  const { data, error } =
  await db
  .from("rifa_numeros")
  .select("status")
  .eq("rifa_id", rifaId);

  if(error) return;

  const disponiveis =
  data.filter(
    item =>
    item.status === "Disponivel"
  ).length;

  const reservados =
  data.filter(
    item =>
    item.status === "Reservado"
  ).length;

  const pagos =
  data.filter(
    item =>
    item.status === "Pago"
  ).length;

  document
  .getElementById(
    "estatisticas"
  ).innerHTML = `

    <p>
      🟢 Disponíveis:
      ${disponiveis}
    </p>

    <p>
      🟡 Reservados:
      ${reservados}
    </p>

    <p>
      🔵 Pagos:
      ${pagos}
    </p>

    <p>
      🔢 Total:
      ${data.length}
    </p>

  `;

}

async function abrirSorteio(rifaId){

  const { data, error } =
  await db
  .from("rifa_numeros")
  .select("*")
  .eq("rifa_id", rifaId)
  .eq("status", "Pago");

  if(error) return;

  if(data.length === 0){
    alert("Nenhum número pago.");
    return;
  }

  window.numerosSorteio = data;
  window.rifaIdAtual = rifaId;

  const conteudo =
  document.getElementById("conteudo");

  conteudo.innerHTML = `
<div class="container">

  <div class="card">

    <h2>🎲 Sorteio</h2>

    <div id="caixaNumeros" class="caixa"></div>

 <button onclick="iniciarSorteio()">
  Sortear
</button>

  </div>

</div>

  `;

montarCaixa();

}

function montarCaixa(){

  const caixa =
  document.getElementById("caixaNumeros");

  caixa.innerHTML = "";

  window.bolas = [];

  window.numerosSorteio.forEach(n => {

    const div =
    document.createElement("div");

    div.className = "bola";
    div.dataset.numero = n.numero;
    div.innerText = n.numero;

    window.bolas.push(div);
    caixa.appendChild(div);

  });

}
function iniciarSorteio(){

  if(window.sorteando) return;
  window.sorteando = true;

  const duracaoTotal = 20000;
  const inicio = Date.now();

  let velocidade = 60;

  const intervalo = setInterval(() => {

    window.bolas.forEach(b => {
      b.classList.remove("ativa");
    });

    const random =
    window.bolas[
      Math.floor(Math.random() * window.bolas.length)
    ];

    random.classList.add("ativa");

    // 🔊 SOM (IMPORTANTE: RESET)
    somTick.currentTime = 0;
    somTick.play().catch(() => {});

    const tempo = Date.now() - inicio;

    // 🔥 desaceleração simples e estável
    if(tempo > 5000) velocidade = 120;
    if(tempo > 12000) velocidade = 220;

  }, velocidade);

  setTimeout(() => {

  clearInterval(intervalo);

  const vencedor =
  window.bolas.find(b =>
    b.classList.contains("ativa")
  );

  window.sorteando = false;

  // 🔥 1. garantir micro delay (resolve bloqueio de áudio)
  setTimeout(() => {

    somWin.currentTime = 0;

    somWin.play()
    .then(() => {
      console.log("WIN tocou");
    })
    .catch((err) => {
      console.log("erro win:", err);
    });

  }, 50);



  // 🔥 2. alert depois do som começar
setTimeout(async () => {

  const numeroVencedor =
  window.numerosSorteio.find(
    n => n.numero == vencedor.dataset.numero
  );

  await db
  .from("rifa_sorteios")
  .insert([{
    rifa_id: window.rifaIdAtual,
    numero_vencedor: numeroVencedor.numero,
    nome_vencedor: numeroVencedor.nome_cliente
  }]);

  alert(
`🏆 VENCEDOR

Número: ${vencedor.dataset.numero}`
  );

}, 300);

}, duracaoTotal);

}


async function carregarHistorico(){

  const lista =
  document.getElementById(
    "listaHistorico"
  );

  const { data, error } =
  await db
  .from("rifa_sorteios")
  .select(`
    *,
    rifas(titulo)
  `)
  .order("id",
  {ascending:false});

  if(error){
    lista.innerHTML =
    "Erro ao carregar.";
    return;
  }

  if(data.length === 0){
    lista.innerHTML =
    "Nenhum sorteio.";
    return;
  }

  lista.innerHTML = "";

  data.forEach(item => {

    lista.innerHTML += `

      <div class="rifaItem">

        <h3>
          🏆 ${item.rifas?.titulo}
        </h3>

        <p>
          Número:
          ${item.numero_vencedor}
        </p>

        <p>
          Vencedor:
          ${item.nome_vencedor}
        </p>

      </div>

    `;

  });

}

async function carregarDashboard(){

  const { data: rifas } =
  await db
  .from("rifas")
  .select("id");

  const { data: numeros } =
  await db
  .from("rifa_numeros")
  .select("status");

  const { data: sorteios } =
  await db
  .from("rifa_sorteios")
  .select("id");

  const pagos =
  numeros.filter(
    n => n.status === "Pago"
  ).length;

  const reservados =
  numeros.filter(
    n => n.status === "Reservado"
  ).length;

  document.getElementById(
    "dashRifas"
  ).innerText =
  rifas.length;

  document.getElementById(
    "dashPagos"
  ).innerText =
  pagos;

  document.getElementById(
    "dashReservados"
  ).innerText =
  reservados;

  document.getElementById(
    "dashSorteios"
  ).innerText =
  sorteios.length;

}

async function carregarParticipantes(){

  const rifaId =
  document.getElementById(
    "filtroRifa"
  ).value;

  const lista =
  document.getElementById(
    "listaParticipantes"
  );

  if(!rifaId){

    lista.innerHTML =
    "Selecione uma rifa.";

    return;

  }

  const { data, error } =
  await db
  .from("rifa_numeros")
  .select("*")
  .eq("rifa_id", rifaId)
  .not("nome_cliente","is",null)
  .order("nome_cliente");

  if(error){

    lista.innerHTML =
    "Erro ao carregar.";

    return;

  }

  if(data.length === 0){

    lista.innerHTML =
    "Nenhum participante.";

    return;

  }

  lista.innerHTML = "";

  data.forEach(item => {

    lista.innerHTML += `

      <div class="rifaItem">

        <h3>
          ${item.nome_cliente}
        </h3>

        <p>
          📞 ${item.telefone || "-"}
        </p>

        <p>
          🎟 Número:
          ${item.numero}
        </p>

        <p>
          📌 ${item.status}
        </p>

      </div>

    `;

  });

}

async function carregarFiltroRifas(){

  const filtro =
  document.getElementById("filtroRifa");

  const { data } =
  await db
  .from("rifas")
  .select("id,titulo")
  .order("titulo");

  filtro.innerHTML =
  '<option value="">Selecione uma rifa</option>';

  data.forEach(rifa => {

    filtro.innerHTML += `
      <option value="${rifa.id}">
        ${rifa.titulo}
      </option>
    `;

  });

}
