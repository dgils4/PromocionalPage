<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela de Preços - Los Visionários</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
    background: #fff;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.titulo {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

.subtitulo {
    text-align: center;
    margin-bottom: 30px;
    color: #555;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
}

th {
    border-bottom: 2px solid #ddd;
    text-align: left;
}

tr {
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

tr:hover {
    background: #f0f0f0;
}

.preco {
    text-align: right;
    font-weight: bold;
}

/* POPUP */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #fff;
    padding: 20px;
    width: 90%;
    max-width: 400px;
    border-radius: 8px;
    text-align: center;
}

.close {
    float: right;
    cursor: pointer;
    font-size: 20px;
}

.voltar {
    margin-top: 25px;
    text-align: center;
}

button {
    padding: 10px 20px;
    border: none;
    background: #333;
    color: #fff;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

    <div class="titulo">BARBEARIA</div>
    <div class="subtitulo">LOS_VISIONÁRIOS</div>

    <table>
        <tr>
            <th>Serviço</th>
            <th class="preco">Preço</th>
        </tr>

        <tr onclick="abrirModal('Pigmentação cabelo','')"><td>Pigmentação cabelo</td><td class="preco">R$ 15,00</td></tr>
        <tr onclick="abrirModal('Pigmentação barba','')"><td>Pigmentação barba</td><td class="preco">R$ 10,00</td></tr>
        <tr onclick="abrirModal('Camuflagem dos fios','')"><td>Camuflagem dos fios</td><td class="preco">R$ 15,00</td></tr>
        <tr onclick="abrirModal('Depilação combo','')"><td>Depilação combo</td><td class="preco">R$ 15,00</td></tr>
        <tr onclick="abrirModal('Acabamento','')"><td>Acabamento</td><td class="preco">R$ 7,00</td></tr>
        <tr onclick="abrirModal('Sobrancelha','')"><td>Sobrancelha</td><td class="preco">R$ 7,00</td></tr>
        <tr onclick="abrirModal('Barba','')"><td>Barba</td><td class="preco">R$ 20,00</td></tr>
        <tr onclick="abrirModal('Barboterapia','')"><td>Barboterapia</td><td class="preco">R$ 25,00</td></tr>
        <tr onclick="abrirModal('Corte máq1','')"><td>Corte máq1</td><td class="preco">R$ 15,00</td></tr>
        <tr onclick="abrirModal('Corte','')"><td>Corte</td><td class="preco">R$ 25,00</td></tr>
        <tr onclick="abrirModal('Corte Infantil','')"><td>Corte Infantil</td><td class="preco">R$ 25,00</td></tr>
        <tr onclick="abrirModal('Luzes','')"><td>Luzes</td><td class="preco">R$ </td></tr>
        <tr onclick="abrirModal('Limpeza Facial','')"><td>Limpeza Facial</td><td class="preco">R$ </td></tr>

    </table>

    <div class="voltar">
        <button onclick="window.history.back()">Voltar</button>
    </div>

</div>

<!-- POPUP -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="fecharModal()">&times;</span>
        <h2 id="tituloServico"></h2>
        <p id="descricaoServico"></p>
    </div>
</div>

<script>
function abrirModal(servico, descricao) {
    document.getElementById("tituloServico").innerText = servico;
    document.getElementById("descricaoServico").innerText = descricao;
    document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
