async function backupCSV(){

 const { data, error } = await db
 .from("atendimentos")
 .select("*")
 .order("data", { ascending: true });

 if(error){
   mostrarToast("Erro ao gerar backup");
   return;
 }

 if(!data.length){
   mostrarToast("Nenhum dado encontrado");
   return;
 }

 let csv = "";

 const colunas = Object.keys(data[0]);
 csv += colunas.join(";") + "\n";

 data.forEach(item => {

   const linha = colunas.map(col => {
     let valor = item[col] ?? "";
     valor = String(valor).replace(/;/g, ",");
     return `"${valor}"`;
   }).join(";");

   csv += linha + "\n";
 });

 const blob = new Blob([csv], {
   type: "text/csv;charset=utf-8;"
 });

 const link = document.createElement("a");

 const hoje = new Date().toISOString().slice(0,10);

 link.href = URL.createObjectURL(blob);
 link.download = "backup_atendimentos_" + hoje + ".csv";

 link.click();

}

let timerPress = null;
let segurando = false;
let iniciouX = 0;
let iniciouY = 0;
let moveu = false;

function segurarExcluir(event,id){

 const toque = event.touches[0];

 iniciouX = toque.clientX;
 iniciouY = toque.clientY;
 moveu = false;
 segurando = false;

 timerPress = setTimeout(async () => {

   if(moveu) return;

   segurando = true;

   if(navigator.vibrate){
     navigator.vibrate(150);
   }

  abrirConfirmacao(
     "🗑️ Excluir atendimento?",
     async ()=>{

       await excluirAtendimento(id);

       mostrarToast("✅ Excluído");

     }
   );

 }, 700);

}

function moverDedo(event){

 const toque = event.touches[0];

 const dx = Math.abs(toque.clientX - iniciouX);
 const dy = Math.abs(toque.clientY - iniciouY);

 if(dx > 15 || dy > 15){
   moveu = true;
   clearTimeout(timerPress);
 }

}

function cancelarSegurar(){
 clearTimeout(timerPress);
}

function calcularVencimento(
  ultimaRenovacao
){

  const data =
  new Date(ultimaRenovacao);

  data.setDate(
    data.getDate() + 30
  );

  return data;

}


function planoVencido(ultimaRenovacao){

  const vencimento =
  calcularVencimento(ultimaRenovacao);

  if(!vencimento) return false;

  return new Date() > vencimento;

}
function diasRestantesPlano(
  ultimaRenovacao
){

  const vencimento =
  calcularVencimento(
    ultimaRenovacao
  );

  const hoje = new Date();

  const diff =
  vencimento - hoje;

  return Math.ceil(
    diff / (1000*60*60*24)
  );

}


async function buscarVencimentos(){

  const { data, error } =
  await db
  .from("clientes")
  .select(`
    nome,
    ultima_renovacao,
    status_plano
  `);

  if(error){
    return [];
  }

  const lista = [];

  data.forEach(cliente => {

    if(
      !cliente.ultima_renovacao
    ) return;

    const dias =
    diasRestantesPlano(
      cliente.ultima_renovacao
    );

    if(dias <= 7){

      lista.push({

        nome: cliente.nome,

        dias,

        vencimento:
        calcularVencimento(
          cliente.ultima_renovacao
        )

      });

    }

  });

  return lista;

}

async function cobrarCliente(nome){

  const { data, error } = await db
  .from("clientes")
  .select("telefone")
  .eq("nome", nome)
  .single();

  if(error || !data){

    mostrarToast(
      "Cliente não encontrado"
    );

    return;
  }

  const telefone =
  (data.telefone || "")
  .replace(/\D/g,'');

  if(
    !telefone ||
    telefone === "0"
  ){

    mostrarToast(
      "Telefone não cadastrado"
    );

    return;
  }

  const mensagem =
`Olá ${nome}, seu plano da barbearia venceu.`;

  const url =
`https://wa.me/55${telefone}?text=${encodeURIComponent(mensagem)}`;

  window.open(url, "_blank");

}

async function carregarFinanceiro(){

  const box =
  document.getElementById(
    "listaFinanceiro"
  );

  box.innerHTML = "Carregando...";

  const { data, error } =
  await db
  .from("financeiro")
  .select("*")
  .order("vencimento", {
    ascending:true
  });

  if(error){

    box.innerHTML = error.message;

    return;
  }

  if(!data.length){

    box.innerHTML =
    "Nenhuma cobrança";

    return;
  }

  box.innerHTML = "";

  data.forEach(item => {

    const vencido =
    item.status !== "pago" &&
    new Date(item.vencimento)
    < new Date();

    box.innerHTML += `

    <div class="cardTela">

      <strong>
        ${item.nome_cliente}
      </strong>

      <br><br>

      💰 R$ ${item.valor}

      <br>

      📅 ${new Date(
        item.vencimento
      ).toLocaleDateString()}

      <br><br>

      <span style="
        color:${
          item.status === "pago"
          ? "#22c55e"
          : vencido
          ? "#ef4444"
          : "#facc15"
        };
        font-weight:700;
      ">

        ${
          item.status === "pago"
          ? "Pago"
          : vencido
          ? "Vencido"
          : "Pendente"
        }

      </span>

    </div>

    `;

  });

}

async function adicionarPlaylist(
  videoId,
  titulo
){

  .from("playlist")
  .insert({
    video_id:videoId,
    titulo:titulo
  });

  await carregarPlaylist();
document.getElementById(
    "resultadosYoutube"
  ).innerHTML = "";

async function carregarPlaylist(){

  const { data } =
  await db
  .from("playlist")
  .select("*")
  .order("id");

  playlist =
  data || [];

  renderizarPlaylist();

  if(
    playlist.length &&
    !player.getVideoData()?.video_id
  ){

    tocarIndice(0);

  }

}

function renderizarPlaylist(){

  const lista =
  document.getElementById(
    "listaPlaylist"
  );

  lista.innerHTML = "";

  playlist.forEach((item,index)=>{

    const div =
    document.createElement("div");

    div.className =
    "itemPlaylist";

    div.innerHTML = `
      ${index+1}.
      ${item.titulo}

      <button>
        ❌
      </button>
    `;

    div.querySelector("button")
    .onclick = ()=>{

      removerMusica(
        item.id
      );

    };

    lista.appendChild(div);

  });

}

async function removerMusica(id){

  await db
  .from("playlist")
  .delete()
  .eq("id",id);

  await carregarPlaylist();

}

async function tocarIndice(
  indice
){

  if(
    indice >= playlist.length
  ) return;

  indiceAtual =
  indice;

  const musica =
  playlist[indice];

  player.loadVideoById(
    musica.video_id
  );

  await db
  .from("player_status")
  .upsert({
    id:1,
    video_id:
    musica.video_id,
    indice:indice
  });

}

function tocarProxima(){

  const proximo =
  indiceAtual + 1;

  if(
    proximo >= playlist.length
  ){

    indiceAtual = 0;

    tocarIndice(0);

    return;

  }

  tocarIndice(
    proximo
  );

}

}
