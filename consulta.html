<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Portal do Cliente - Los Visionários</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050b16;
  font-family:Arial,sans-serif;
  color:#fff;
  padding:20px;
}

.container{
  max-width:460px;
  margin:auto;
}

.topo{
  background:#0f172a;
  padding:20px;
  border-radius:16px;
  border:1px solid #1d4ed8;
  margin-bottom:15px;
}

h1{
  text-align:center;
  color:#60a5fa;
  margin-bottom:15px;
  font-size:24px;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  outline:none;
  margin-bottom:10px;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#1d4ed8;
  color:#fff;
  font-size:16px;
  font-weight:bold;
}

.resumo{
  display:none;
  background:#0f172a;
  padding:15px;
  border-radius:16px;
  border:1px solid #1e3a8a;
  margin-bottom:15px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  background:#111827;
  padding:12px;
  border-radius:12px;
  text-align:center;
}

.box strong{
  display:block;
  color:#60a5fa;
  font-size:22px;
}

.card{
  background:#0f172a;
  border-left:4px solid #1d4ed8;
  padding:15px;
  border-radius:14px;
  margin-bottom:12px;
}

.nome{
  font-size:18px;
  font-weight:bold;
}

hr{
  border:none;
  border-top:1px solid #1e3a8a;
  margin:10px 0;
}

.valor{
  margin-top:10px;
  color:#60a5fa;
  font-size:19px;
  font-weight:bold;
}

.barra{
  width:100%;
  height:12px;
  background:#111827;
  border-radius:20px;
  overflow:hidden;
  margin-top:8px;
}

.progresso{
  height:100%;
  background:#22c55e;
}

.msg{
  text-align:center;
  color:#93c5fd;
  margin-top:15px;
}
</style>
</head>
<body>

<div class="container">

  <div class="topo">
    <h1>Los Visionários</h1>

    <input id="nome" placeholder="Digite seu nome completo">

    <button onclick="buscar()">Consultar Histórico</button>
  </div>

  <div class="resumo" id="resumo">
    <div class="grid">
      <div class="box">
        <strong id="visitas">0</strong>
        Visitas
      </div>

      <div class="box">
        <strong id="gasto">R$ 0</strong>
        Total Gasto
      </div>
    </div>
  </div>

  <div id="resultado"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const db = supabase.createClient(  
  'https://cdechrtprerblmhllqav.supabase.co',  
 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkZWNocnRwcmVyYmxtaGxscWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjc3MjMsImV4cCI6MjA5MTYwMzcyM30.m-RFl-dDWFsjbWqSZw-y0BDqnpHX5hMH8Z361MCT_Rk'  
);

async function buscar(){

  const nome = document
    .getElementById("nome")
    .value
    .trim();

  const resultado = document.getElementById("resultado");
  const resumo = document.getElementById("resumo");

  if(nome.length < 3){
    resultado.innerHTML =
    '<div class="msg">Digite seu nome completo</div>';
    resumo.style.display = "none";
    return;
  }

  resultado.innerHTML =
  '<div class="msg">Carregando...</div>';

  const { data, error } = await db
  .from("atendimentos")
  .select("nome_cliente,data,barbeiro,tipo_cliente,numero_corte,valor,servico")
 .ilike("nome_cliente", `%${nome}%`)
  .order("data",{ascending:false});

  if(error){
    resultado.innerHTML =
    '<div class="msg">Erro ao buscar</div>';
    resumo.style.display = "none";
    return;
  }

  if(!data || data.length === 0){
    resultado.innerHTML =
    '<div class="msg">Nenhum histórico encontrado</div>';
    resumo.style.display = "none";
    return;
  }
const { data: cli } = await db
.from("clientes")
.select("data_adesao_plano,status_plano,nome")
.ilike("nome", `%${nome}%`)
.limit(1)
.single();

let html = "";
let statusTexto = "";
let statusCor = "";
let adesaoTexto = "";

if(cli){

 if(cli.status_plano === "ativo"){
   statusTexto = "🟢 Cliente Ativo";
   statusCor = "#22c55e";
 }
 else if(cli.status_plano === "inativo"){
   statusTexto = "🔴 Cliente Inativo";
   statusCor = "#ef4444";
 }
 else{
   statusTexto = "🔵 Cliente Cadastrado";
   statusCor = "#3b82f6";
 }

 if(cli.data_adesao_plano){
   adesaoTexto = `<br><br>📅 Desde ${cli.data_adesao_plano}`;
 }

 html += `
 <div class="card" style="
 border-left:4px solid ${statusCor};
 background:${statusCor}15;
 ">
   <strong style="color:${statusCor}">
   ${statusTexto}
   </strong>

   ${adesaoTexto}
 </div>
 `;
}


  
  let total = 0;

  const visitasAvulso =
  data.filter(x => x.tipo_cliente === "avulso").length;

  data.forEach(item => {

    total += Number(item.valor || 0);

    let tipo = "";
    let extra = "";
    let valorTexto = "";
    let estiloCard = "";

    if(item.tipo_cliente === "plano"){

      tipo = "🟢 Plano Mensal";

      const corte = Number(item.numero_corte || 0);
      const porcentagem = corte * 25;

      extra = `
      ✂️ Corte ${corte}/4

      <div class="barra">
        <div class="progresso"
        style="width:${porcentagem}%"></div>
      </div>
      `;

      valorTexto =
      "💰 R$ 0,00 • Incluso no Plano";

      estiloCard = `
      background:rgba(59,130,246,.12);
      border-left:4px solid #3b82f6;
      `;

    }else{

      tipo = "🔵 Atendimento Avulso";

      let resto = visitasAvulso % 11;

      if(resto === 10){
        extra = `
        <div style="
        margin-top:10px;
        background:#16a34a;
        padding:10px;
        border-radius:10px;
        font-weight:bold;">
        🎁 Corte Grátis Disponível
        </div>
        `;
      }else{
 
      }

      if(Number(item.valor) === 0){

        valorTexto =
        "💰 R$ 0,00 • Não paga";

        estiloCard = `
        background:rgba(220,38,38,.15);
        border-left:4px solid #dc2626;
        `;

      }else{

        valorTexto =
        "💰 R$ " +
        Number(item.valor)
        .toFixed(2)
        .replace(".",",");

      }
    }

    html += `
    <div class="card" style="${estiloCard}">

      <div class="nome">${item.nome_cliente}</div>

      <hr>

      📅 ${item.data}<br><br>
      💈 Barbeiro: ${item.barbeiro}<br><br>
      ${tipo}<br><br>
      ✂️ ${item.servico || "Não informado"}<br><br>

      ${extra}

      <div class="valor">
      ${valorTexto}
      </div>

    </div>
    `;
  });

  document.getElementById("visitas").innerText =
  data.length;

  document.getElementById("gasto").innerText =
  "R$ " + total.toFixed(2).replace(".",",");

  resumo.style.display = "block";
  resultado.innerHTML = html;
}
</script>

</body>
</html>
