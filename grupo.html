<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo VIP | Los Visionários</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* BOTÃO VOLTAR */
.voltar {
  position: fixed;
  top: 15px;
  left: 15px;
  background: #111;
  color: white;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

/* CONTAINER */
.container {
  text-align: center;
  padding: 30px;
  max-width: 400px;
}

/* LOGO */
.logo {
  width: 120px;
  border-radius: 50%;
  border: 3px solid #00aaff;
  margin-bottom: 20px;
}

/* TÍTULO */
h1 {
  font-size: 26px;
  margin-bottom: 10px;
}

/* TEXTO */
p {
  color: #ccc;
  font-size: 16px;
  margin-bottom: 25px;
}

/* BOTÃO */
.botao {
  display: inline-block;
  padding: 15px 25px;
  background: #00aaff;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-size: 18px;
  transition: 0.3s;
}

.botao:hover {
  background: #008fcc;
}

/* DESTAQUE */
.destaque {
  color: #00aaff;
  font-weight: bold;
}

/* RODAPÉ */
.footer {
  margin-top: 30px;
  font-size: 12px;
  color: #777;
}
</style>

</head>
<body>

<!-- BOTÃO VOLTAR -->
<div class="voltar" onclick="voltarPagina()">← Voltar</div>

<div class="container">

  <img src="img/novalogo.jpg" class="logo">

  <h1>Grupo VIP<br><span class="destaque">Los Visionários</span></h1>

  <p>
    Entre no nosso grupo exclusivo <strong>para fins informativos</strong> e receba:<br><br>
    🔥 Promoções especiais<br>
    ✂️ Avisos e novidades<br>
  
  </p>

  <a href="https://chat.whatsapp.com/ByC0L1coV6TCd4DkECOh1l?mode=gi_t" 
     class="botao" target="_blank">
     Entrar no Grupo
  </a>

  <div class="footer">
    Barbearia Los Visionários 💈
  </div>

</div>

<script>
function voltarPagina() {
  window.history.back();
}
</script>

</body>
</html>
