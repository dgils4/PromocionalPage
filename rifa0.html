<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Rifas Online</title>

<style>*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:#f4f4f4;

font-family:Arial,sans-serif;

}

header{

background:#1d4ed8;

color:#fff;

padding:18px;

text-align:center;

font-size:24px;

font-weight:bold;

box-shadow:0 2px 8px rgba(0,0,0,.15);

}

main{

max-width:1100px;

margin:auto;

padding:20px;

}

.listaRifas{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:20px;

margin-top:20px;

}

.card{

background:#fff;

border-radius:15px;

overflow:hidden;

box-shadow:0 5px 15px rgba(0,0,0,.1);

transition:.2s;

}

.card:hover{

transform:translateY(-4px);

}

.card img{

width:100%;

height:220px;

object-fit:cover;

}

.info{

padding:15px;

}

.info h3{

margin-bottom:10px;

}

.valor{

color:#16a34a;

font-size:22px;

font-weight:bold;

margin-bottom:15px;

}

.progresso{

width:100%;

height:12px;

background:#ddd;

border-radius:20px;

overflow:hidden;

margin:15px 0;

}

.barra{

height:100%;

background:#22c55e;

}

.btn{

width:100%;

padding:12px;

border:none;

background:#2563eb;

color:white;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

.btn:hover{

background:#1e40af;

}</style>

</head>

<body>

<header>

<div class="logo">

🎟️ Rifa Online

</div>

</header>

<main>

<h2>Rifas Disponíveis</h2>

<div id="listaRifas"
class="listaRifas">

Carregando...

</div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://cdechrtprerblmhllqav.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkZWNocnRwcmVyYmxtaGxscWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjc3MjMsImV4cCI6MjA5MTYwMzcyM30.m-RFl-dDWFsjbWqSZw-y0BDqnpHX5hMH8Z361MCT_Rk";

const db =
supabase.createClient(
  supabaseUrl,
  supabaseKey
);
</script>

<script>
  
  
  
  async function carregarRifas(){

  const lista =
  document.getElementById("listaRifas");

  lista.innerHTML = "Carregando...";

  const { data, error } =
  await db
  .from("rifas")
  .select("*")
  .eq("status","Ativa")
  .order("id",{ascending:false});

  if(error){

    console.log(error);

    lista.innerHTML =
    "Erro ao carregar.";

    return;

  }

  if(data.length == 0){

    lista.innerHTML =
    "Nenhuma rifa disponível.";

    return;

  }

  lista.innerHTML = "";

  for(const rifa of data){

    const { count } =
    await db
    .from("rifa_numeros")
    .select("*",{
      count:"exact",
      head:true
    })
    .eq("rifa_id",rifa.id)
    .eq("status","Pago");

    const vendidos = count || 0;

    const porcentagem =
    Math.round(
      vendidos * 100 /
      rifa.quantidade_numeros
    );

    lista.innerHTML += `

<div class="card">

<img src="${rifa.imagem}">

<div class="info">

<h3>${rifa.titulo}</h3>

<p>${rifa.descricao}</p>

<div class="valor">

R$ ${Number(
rifa.valor_numero
).toFixed(2)}

</div>

<div class="progresso">

<div
class="barra"
style="width:${porcentagem}%">
</div>

</div>

<p>

<strong>${porcentagem}% vendido</strong>

<br>

${vendidos} de ${rifa.quantidade_numeros} números

</p>

<br>

<button
class="btn"
onclick="
location.href=
'rifa.html?id=${rifa.id}'
">

Participar

</button>

</div>

</div>

`;

  }

}

carregarRifas();
  
  
</script>

</body>

</html>
