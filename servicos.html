<!DOCTYPE html>
<html>
<head>
<title>Serviços</title>

<style>
body{
  font-family: Arial;
  background:#0f0f0f;
  color:#fff;
  padding:20px;
}

h2{
  margin-bottom:15px;
}

input{
  width:95%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#00c896;
  color:#fff;
  font-weight:bold;
  margin-top:5px;
}

button:hover{
  opacity:0.8;
}

.card{
  background:#1c1c1c;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.delete{
  background:#ff3b3b;
  padding:8px 10px;
  border-radius:6px;
}
</style>

</head>
<body>

<h2>Cadastrar Serviço</h2>
<center>
<input id="nome" placeholder="Nome do serviço">
<input id="preco" placeholder="Preço">


</center>
<button onclick="salvarServico()">Salvar</button>
<div id="lista"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script>  
const { createClient } = supabase;  
  
const db = createClient(  
'https://cdechrtprerblmhllqav.supabase.co',  
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkZWNocnRwcmVyYmxtaGxscWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjc3MjMsImV4cCI6MjA5MTYwMzcyM30.m-RFl-dDWFsjbWqSZw-y0BDqnpHX5hMH8Z361MCT_Rk'  
);  

// SALVAR
async function salvarServico(){

  await db.from('servicos').insert([{
    nome: nome.value,
    preco: preco.value
  }]);

  nome.value = "";
  preco.value = "";

  carregar();
}

// CARREGAR
async function carregar(){

  const { data } = await db
    .from('servicos')
    .select('*')
    .order('id', { ascending: false });

  lista.innerHTML = '';

  data.forEach(item => {

    lista.innerHTML += `
      <div class="card">
        <div>
          <b>${item.nome}</b><br>
          R$ ${item.preco}
        </div>

        <button class="delete" onclick="excluirServico(${item.id})">
          Excluir
        </button>
      </div>
    `;
  });
}

// EXCLUIR
async function excluirServico(id){

  await db
    .from('servicos')
    .delete()
    .eq('id', id);

  carregar();
}

carregar();
</script>

</body>
</html>
