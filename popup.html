<!-- POPUP AVISO AUMENTO -->
<style>
#popupOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

#popupBox {
    background: #fff;
    padding: 30px;
    border-radius: 10px;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    animation: aparecer 0.3s ease;
}

#popupBox h2 {
    margin-top: 0;
}

#popupBox p {
    color: #555;
    margin: 15px 0;
}

#fecharPopup {
    padding: 10px 20px;
    border: none;
    background: #333;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

#fecharPopup:hover {
    opacity: 0.8;
}

@keyframes aparecer {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>

<div id="popupOverlay">
    <div id="popupBox">
        <h2>⚠ Aviso Importante</h2>
        <p>
            Informamos que a partir de <strong>1º de Abril</strong><br>
            o valor do corte passará para<br>
            <strong>R$ 25,00</strong>.
        </p>
        <p>Agradecemos a compreensão e confiança.</p>
        <button id="fecharPopup">Entendi</button>
    </div>
</div>

<script>
setTimeout(function() {
    document.getElementById("popupOverlay").style.display = "flex";
}, 3000); // aparece após 3 segundos

document.getElementById("fecharPopup").addEventListener("click", function() {
    document.getElementById("popupOverlay").style.display = "none";
});
</script>
