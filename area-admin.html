<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
</head>
<body>

<h1>Painel Admin</h1>

<button onclick="sair()">Sair</button>

<h2>Adicionar Produto</h2>

<input id="nome" placeholder="Nome"><br>
<input id="preco" type="number" placeholder="Preço"><br>

<button onclick="addProduto()">Adicionar</button>

<div id="lista"></div>

<script>
// 🔒 proteção simples
if(localStorage.getItem("logado") !== "true") {
  window.location.href = "login.html";
}

let produtos = [];

function addProduto() {
  const nome = document.getElementById("nome").value;
  const preco = document.getElementById("preco").value;

  produtos.push({ nome, preco });

  render();
}

function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  produtos.forEach(p => {
    lista.innerHTML += `<p>${p.nome} - R$ ${p.preco}</p>`;
  });
}

function sair() {
  localStorage.removeItem("logado");
  window.location.href = "login.html";
}
</script>

</body>
</html>
