<!-- login.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login - Los Visionários</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#050b16;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}
.box{
width:90%;
max-width:380px;
background:#0f172a;
padding:25px;
border-radius:16px;
box-shadow:0 0 20px #0006;
display:flex;
justify-content: center;
flex-direction: column;
align-items: center;
}
h2{
margin-top:0;
text-align:center;
}
input{
width:80%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:16px;
}
button{
width:87%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1d4ed8;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
.msg{
margin-top:10px;
text-align:center;
font-size:14px;
color:#93c5fd;
}
</style>
</head>
<body>

<div class="box">
<h2>💈 Los Visionários</h2>

<input type="email" id="email" placeholder="Seu email">
<input type="password" id="senha" placeholder="Sua senha">

<button onclick="entrar()">Entrar</button>

<div class="msg" id="msg"></div>
</div>


 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

  
  
  
const { createClient } = supabase;

const db = createClient(
'https://cdechrtprerblmhllqav.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkZWNocnRwcmVyYmxtaGxscWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjc3MjMsImV4cCI6MjA5MTYwMzcyM30.m-RFl-dDWFsjbWqSZw-y0BDqnpHX5hMH8Z361MCT_Rk'
);

async function entrar(){

  const email = document.getElementById("email").value.trim();
  const senha = document.getElementById("senha").value.trim();
  const msg = document.getElementById("msg");

  msg.innerHTML = "Entrando...";

  const { error } = await db.auth.signInWithPassword({
    email,
    password: senha
  });

  if(error){
    msg.innerHTML = "Email ou senha inválidos";
    return;
  }

  // Usuário autenticado
  const {
    data: { user }
  } = await db.auth.getUser();

  // Busca informações do usuário
  const { data: usuario, error: erroUsuario } = await db
    .from("usuarios")
    .select("*")
    .eq("auth_user_id", user.id)
    .single();

  if (erroUsuario) {
    msg.innerHTML = "Usuário não encontrado.";
    return;
  }

  // Salva os dados para usar no sistema
  localStorage.setItem("empresa_id", usuario.empresa_id);
  localStorage.setItem("usuario_id", usuario.id);
  localStorage.setItem("nome_usuario", usuario.nome);
  localStorage.setItem("cargo", usuario.cargo);

  location.href = "agenda.html";
}
</script>

</body>
</html>
